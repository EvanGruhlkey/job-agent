<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resume Job Agent</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="landing">
    <main class="app-shell">
      <button
        id="themeToggle"
        class="theme-toggle"
        type="button"
        aria-label="Switch to dark mode"
        aria-pressed="false"
        title="Switch to dark mode"
      >
        <svg class="theme-icon sun-icon" aria-hidden="true" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="4"></circle>
          <path d="M12 2v2"></path>
          <path d="M12 20v2"></path>
          <path d="m4.93 4.93 1.41 1.41"></path>
          <path d="m17.66 17.66 1.41 1.41"></path>
          <path d="M2 12h2"></path>
          <path d="M20 12h2"></path>
          <path d="m6.34 17.66-1.41 1.41"></path>
          <path d="m19.07 4.93-1.41 1.41"></path>
        </svg>
        <svg class="theme-icon moon-icon" aria-hidden="true" viewBox="0 0 24 24">
          <path d="M12 3a6 6 0 0 0 9 7.5A9 9 0 1 1 12 3Z"></path>
        </svg>
      </button>
      <div class="app-container">
        <section class="card search-card" aria-label="Job search">
          <form id="searchForm" class="search-form">
            <label class="field">
              <span>Job title</span>
              <input id="targetTitle" name="targetTitle" placeholder="Software engineer intern" required />
            </label>

            <label class="field">
              <span>Location</span>
              <input id="location" name="location" placeholder="Remote, Chicago, Austin" />
            </label>

            <label class="field result-field">
              <span>Results</span>
              <input id="maxJobs" name="maxJobs" type="number" min="1" max="200" value="25" />
            </label>

            <button class="button button-primary search-button" type="submit">Find jobs</button>
          </form>
        </section>

        <div class="status-strip" id="statusStrip">
          <span class="status-dot" aria-hidden="true"></span>
          <span class="status-text">Ready to search.</span>
        </div>

        <section class="content-grid">
          <section class="jobs-column" aria-labelledby="matchesTitle">
            <div class="section-heading">
              <div>
                <h2 id="matchesTitle">Matches</h2>
                <span id="jobCount">0 found</span>
              </div>
              <button id="sortRecentBtn" type="button" class="button button-secondary button-sm" disabled>
                Most recent
              </button>
            </div>

            <div id="jobsList" class="jobs-list empty-state">
              Enter a job title to start searching.
            </div>
          </section>

          <section class="detail-column" aria-labelledby="detailsTitle">
            <div class="section-heading">
              <div>
                <h2 id="detailsTitle">Details</h2>
              </div>
              <a
                id="jobLink"
                class="button button-secondary button-sm link-button disabled"
                aria-disabled="true"
                target="_blank"
                rel="noreferrer"
              >
                Open listing
              </a>
            </div>

            <div id="jobDetail" class="card job-detail empty-state">
              Select a job to read the listing summary.
            </div>
          </section>
        </section>
      </div>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
