<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Resume Job Agent</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="workspace">
        <aside class="control-panel">
          <div class="brand">
            <div class="brand-mark">RJ</div>
            <div>
              <h1>Resume Job Agent</h1>
              <p>Search roles that match your target title and location.</p>
            </div>
          </div>

          <form id="searchForm" class="search-form">
            <label>
              Target job title
              <input id="targetTitle" name="targetTitle" placeholder="Software engineer intern" required />
            </label>

            <label>
              Location
              <input id="location" name="location" placeholder="Remote, Chicago, Austin..." />
            </label>

            <label>
              Results
              <input id="maxJobs" name="maxJobs" type="number" min="1" max="200" value="25" />
            </label>

            <p class="search-hint">We keep searching result pages until this count is reached or listings run out.</p>

            <button class="primary-action" type="submit">
              <span class="button-icon">⌕</span>
              Find jobs
            </button>
          </form>
        </aside>

        <section class="results-panel">
          <div class="status-strip" id="statusStrip">
            <span class="status-dot"></span>
            Ready to search.
          </div>

          <div class="content-grid">
            <section class="jobs-column">
              <div class="section-heading">
                <h2>Job matches</h2>
                <div class="section-actions">
                  <button id="sortRecentBtn" type="button" class="sort-button" disabled>
                    Most recent
                  </button>
                  <span id="jobCount">0 found</span>
                </div>
              </div>
              <div id="jobsList" class="jobs-list empty-state">
                Enter a job title to start searching.
              </div>
            </section>

            <section class="detail-column">
              <div class="section-heading">
                <h2>Job details</h2>
                <div class="toolbar">
                  <a id="jobLink" class="icon-button link-button disabled" title="Open listing" target="_blank" rel="noreferrer">↗</a>
                </div>
              </div>

              <div id="jobDetail" class="job-detail empty-state">
                Select a job to read the listing summary.
              </div>
            </section>
          </div>
        </section>
      </section>
    </main>

    <script src="/app.js" type="module"></script>
  </body>
</html>
